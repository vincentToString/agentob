services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentob_user
      POSTGRES_PASSWORD: agentob_password
      POSTGRES_DB: agentob_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql # Mount the initialization SQL script
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentob_user -d agentob_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # port
      - "15672:15672" # management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - "rabbitmq_data:/var/lib/rabbitmq"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  intake:
    build:
      context: ./intake
      dockerfile: Dockerfile
    container_name: intake
    ports:
      - "8000:8000"
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379
      - DIFF_TTL=3600
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./intake:/app/intake

  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: analyzer
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=agentob_user
      - POSTGRES_PASSWORD=agentob_password
      - POSTGRES_DB=agentob_db
      - LOG_LEVEL=INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./analyzer:/app/analyzer

  dedup_worker:
    build:
      context: ./dedup_worker
      dockerfile: Dockerfile
    container_name: dedup_worker
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - BLOOMBOX_GRPC_HOST=host.docker.internal
      - BLOOMBOX_GRPC_PORT=50051
      - BLOOMBOX_HTTP_URL=http://host.docker.internal:8080
      - BLOOM_EXPECTED_ITEMS=1000000
      - BLOOM_FALSE_POS_RATE=0.01
      - DEDUP_PREFETCH_COUNT=100
      - LOG_LEVEL=INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./dedup_worker:/app/dedup_worker

  llm_worker:
    build:
      context: ./llm_worker
      dockerfile: Dockerfile
    container_name: llm_worker
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=agentob_user
      - POSTGRES_PASSWORD=agentob_password
      - POSTGRES_DB=agentob_db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
      - LLM_MODEL=openai/gpt-4o-mini
      - LLM_MAX_TOKENS=500
      - LLM_TEMPERATURE=0.3
      - LLM_TIMEOUT=30
      - LOG_LEVEL=INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./llm_worker:/app/llm_worker

  outbound:
    build:
      context: ./outbound
      dockerfile: Dockerfile
    container_name: outbound
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - SLACK_TOKEN=${SLACK_TOKEN}
      - REDIS_URL=redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./outbound:/app/outbound

  rag_service:
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    container_name: rag_service
    ports:
      - "8002:8002"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=agentob_user
      - POSTGRES_PASSWORD=agentob_password
      - POSTGRES_DB=agentob_db
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE=${OPENROUTER_BASE:-https://openrouter.ai/api/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8002
      - KG_CHUNK_SIZE=${KG_CHUNK_SIZE:-512}
      - KG_CHUNK_OVERLAP=${KG_CHUNK_OVERLAP:-50}
      - KG_MAX_ENTITIES_PER_CHUNK=${KG_MAX_ENTITIES_PER_CHUNK:-10}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./rag_service:/app/rag_service

  dashboard:
    build:
      context: ./dash/api
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "8003:8003"
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8003
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=agentob_user
      - POSTGRES_PASSWORD=agentob_password
      - POSTGRES_DB=agentob_db
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - RABBITMQ_MANAGEMENT_URL=http://admin:password@rabbitmq:15672
      - REDIS_URL=redis://redis:6379
      - METRICS_REFRESH_INTERVAL=5
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./dash/api:/app

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
